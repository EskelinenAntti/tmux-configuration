bind-key r source-file ~/.config/tmux/tmux.conf
bind-key g new-window lazygit
bind-key G new-window -n diff 'nvim -c "DiffviewOpen"'
bind-key e new-window $EDITOR
bind-key q kill-window
bind-key o run-shell ide
bind-key s choose-tree -s -O time -y
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection -x

set-option -g prefix C-Space
set-option -g mode-keys vi
set-option -g mouse on

set-option -g set-clipboard on
set-option -g automatic-rename on
set-option -g base-index 1
set-option -g renumber-windows on
set-option -g detach-on-destroy off
set-option -g allow-passthrough on
set-option -g focus-events on
set-option -s extended-keys on
set-option -as terminal-features 'xterm*:extkeys'


set-option -g status-style "bg=default,fg=white"
set-option -g status-left ""
set-option -g status-right "#{?client_prefix, * ,   }#[fg=brightwhite,bg=black] session #[fg=black,bg=green] #S #[default]"
set-option -g status 2
set-option -g status-format[1] ""
set-option -g window-status-format "#[fg=black,bg=white] #I #[fg=brightwhite,bg=black] #W "
set-option -g window-status-current-format "#[fg=black,bg=pink] #I #[fg=brightwhite, bg=black] #W "
set-option -g status-position top
set-option -g message-style "fg=white bg=black"
set-option -g message-command-style "fg=white bg=default"
set-option -g mode-style "fg=black,bg=grey"
set-option -g clock-mode-colour "blue"

