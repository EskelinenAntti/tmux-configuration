####################
# General settings #
####################

set -g mouse on

# Fix clipboard and copying
set -g set-clipboard on
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi v send -X begin-selection

# rename windows automatically
setw -g automatic-rename on

# Start indexing from 1 for keyboard navigation
set -g base-index 1

set-option -g detach-on-destroy off
set -g renumber-windows on

################
# Key bindings #
################

unbind C-b
set-option -g prefix C-Space

bind-key r source-file ~/.config/tmux/tmux.conf
bind-key g neww lazygit
bind-key q killw
bind-key o run ide

# Enable vim mode
set-option -g mode-keys vi

##################
# UI and styling #
##################

### Status bar
set -g status-style "bg=default,fg=white"
set -g status-left ""
set -g status-right "#{?client_prefix, * ,   }#[fg=brightwhite,bg=black] session #[fg=black,bg=green] #S #[default]"
set -g status 2
set -g status-format[1] ""

set -g window-status-format "#[fg=black,bg=white] #I #[fg=brightwhite,bg=black] #W "
set -g window-status-current-format "#[fg=black,bg=pink] #I #[fg=brightwhite, bg=black] #W "
set -g status-position top

# Command prompt style
set -gF message-style "fg=white bg=black"
set -gF message-command-style "fg=white bg=default"

# Modes
set -g mode-style "fg=black,bg=grey"
set -gF clock-mode-colour "blue"

